<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Dungeon Dice Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<h1>🧩 Dungeon Dice</h1>

<!-- Zar ekranı -->
<div id="diceScreen" class="hidden">
  <h2>Zar Savaşı</h2>
  <div id="diceArea">
    <div id="playerDice" class="dice">?</div>
    <div id="enemyDice" class="dice">?</div>
  </div>
  <p id="battleInfo">Düşmanla karşılaştın!</p>
  <button onclick="rollDice()">🎲 Zar At</button>
</div>

<div id="gameContainer">
  <canvas id="gameCanvas" width="490" height="490"></canvas>
</div>
<div id="healthUI">
    <img src="adsız.png" id="heartIcon">
    <span id="hpValue">10</span>
</div>
<canvas id="miniMap" width="140" height="140"></canvas>
<script src="game.js"></script>


</body>
</html>
