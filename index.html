<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Dungeon Dice Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1> ⚔️ Dungeon Inferno </h1>

<div id="diceScreen" class="hidden">
  <h2 id="battleHeader">⚠️ GARDİYANLA SAVAŞ</h2>
  <div id="diceArea">
    <div class="dice-wrapper">
      <span>OYUNCU</span>
      <div id="playerDice" class="dice">?</div>
    </div>
    <div class="vs">VS</div>
    <div class="dice-wrapper">
      <span>Gardiyan</span>
      <div id="enemyDice" class="dice">?</div>
    </div>
  </div>
  <p id="battleStatus">Zar atarak kurtulmaya çalış!</p>
  <button id="rollBtn" onclick="rollDice()">🎲 Zar At</button>
</div>

<div id="gameContainer">
  <canvas id="gameCanvas" width="1200" height="600"></canvas>
</div>

<div id="statusBoard">
  ❤️ <span id="hpValue">10</span>
</div>


<audio id="soundDefeat" src="defeat.mp3"></audio>
<audio id="loopMusic" src="loopMusic.mp3" loop preload="auto"></audio>
<audio id="soundStep" src="taştekli.mp3"></audio>
<audio id="soundDamage" src="damage.mp3"></audio>
<audio id="soundEncounter" src="universfield-marimba-lose-250960.mp3"></audio>
<audio id="soundWin" src="freesound_crunchpixstudio-material-gold-394476.mp3"></audio>
<audio id="soundVictoryAll" src="victory_all.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
